name: AgileTest Sync - JUnit

on:
  workflow_dispatch:
    inputs:
      TEST_EXECUTION_KEY:
        description: "Test Execution Key"
        default: ''
      PROJECT_KEY:
        description: "Project Key"
        default: ''
      milestoneId:
        description: "Milestone ID"
        default: ''
      testEnvironments:
        description: "Test Environment (staging/production)"
        default: ''

env:
  BASE_URL: ${{ vars.BASE_URL }}
  BASE_AUTH_URL: ${{ vars.BASE_AUTH_URL }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  PROJECT_KEY: ${{ github.event.inputs.PROJECT_KEY || vars.PROJECT_KEY }}

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Execute Tests
        run: mvn test
        continue-on-error: true

      - name: Submit to AgileTest
        if: always()
        run: |
          TOKEN=$(curl -s "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" | tr -d '"')

          # Find xml file
          FILE=$(find target/surefire-reports -name "TEST-*.xml" | head -n 1)
          echo "File: $FILE"

          # Build URL
          URL="$BASE_URL/ds/test-executions/junit?projectKey=$PROJECT_KEY"

          if [ -n "${{ github.event.inputs.TEST_EXECUTION_KEY }}" ]; then
            URL="$URL&testExecutionKey=${{ github.event.inputs.TEST_EXECUTION_KEY }}"
          fi

          if [ -n "${{ github.event.inputs.milestoneId }}" ]; then
            URL="$URL&milestoneId=${{ github.event.inputs.milestoneId }}"
          fi

          if [ -n "${{ github.event.inputs.testEnvironments }}" ]; then
            URL="$URL&testEnvironments=${{ github.event.inputs.testEnvironments }}"
          fi

          echo "URL: $URL"
          curl -X POST "$URL" \
            -H "Content-Type:application/xml" \
            -H "Authorization:JWT $TOKEN" \
            --data-binary "@$FILE"

      - name: Update Pipeline Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            RESULT="success"
          else
            RESULT="failed"
          fi

          TOKEN=$(curl -s "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -X POST -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" | tr -d '"')

          JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -n "${{ github.event.inputs.TEST_EXECUTION_KEY }}" ]; then
            curl -X POST "$BASE_AUTH_URL/ds/test-executions/${{ github.event.inputs.TEST_EXECUTION_KEY }}/pipeline/history?projectKey=$PROJECT_KEY" \
              -H "Content-Type: application/json" \
              -H "Authorization: JWT $TOKEN" \
              --data "{\"jobURL\":\"$JOB_URL\",\"repository\":\"${{ github.repository }}\",\"tool\":\"github\",\"result\":\"$RESULT\"}"
          fi
