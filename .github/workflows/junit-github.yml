name: AgileTest Sync - JUnit

on:
  workflow_dispatch:
    inputs:
      TEST_EXECUTION_KEY:
        description: "Test Execution Key"
        default: ''
      PROJECT_KEY:
        description: "Project Key"
        default: ''
      milestoneId:
        description: "Milestone ID"
        default: ''
      testEnvironments:
        description: "Test Environment (staging/production)"
        default: ''

env:
  BASE_URL: ${{ vars.BASE_URL }}
  BASE_AUTH_URL: ${{ vars.BASE_AUTH_URL }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  PROJECT_KEY: ${{ github.event.inputs.PROJECT_KEY || vars.PROJECT_KEY }}

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Execute Tests
        run: mvn test
        continue-on-error: true

      - name: Submit to AgileTest
        if: always()
        run: |
          TOKEN=$(curl -s "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" | tr -d '"')
      
          FILE=$(find target/surefire-reports -name "TEST-*.xml" | head -n 1)
          URL="$BASE_URL/ds/test-executions/junit?projectKey=$PROJECT_KEY"
      
          if [ -n "${{ github.event.inputs.TEST_EXECUTION_KEY }}" ]; then
            URL="$URL&testExecutionKey=${{ github.event.inputs.TEST_EXECUTION_KEY }}"
          fi
          if [ -n "${{ github.event.inputs.milestoneId }}" ]; then
            URL="$URL&milestoneId=${{ github.event.inputs.milestoneId }}"
          fi
          if [ -n "${{ github.event.inputs.testEnvironments }}" ]; then
            URL="$URL&testEnvironments=${{ github.event.inputs.testEnvironments }}"
          fi
      
          RESPONSE=$(curl -s -X POST "$URL" \
            -H "Content-Type:application/xml" \
            -H "Authorization:JWT $TOKEN" \
            --data-binary "@$FILE")
      
          echo "Response: $RESPONSE"
      
          # Parse key từ response
          CREATED_KEY=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('key',''))" 2>/dev/null)
      
          # Ưu tiên input, nếu không có thì dùng key vừa tạo
          EXEC_KEY="${{ github.event.inputs.TEST_EXECUTION_KEY }}"
          if [ -z "$EXEC_KEY" ]; then
            EXEC_KEY="$CREATED_KEY"
          fi
      
          echo "EXEC_KEY=$EXEC_KEY" >> $GITHUB_ENV
      
      - name: Update Pipeline Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            RESULT="success"
          else
            RESULT="failed"
          fi
      
          TOKEN=$(curl -s "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -X POST -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" | tr -d '"')
      
          echo "Execution key: $EXEC_KEY"
      
          if [ -n "$EXEC_KEY" ]; then
            curl -X POST "$BASE_AUTH_URL/ds/test-executions/$EXEC_KEY/pipeline/history?projectKey=$PROJECT_KEY" \
              -H "Content-Type: application/json" \
              -H "Authorization: JWT $TOKEN" \
              --data "{\"repository\":\"${{ github.repository }}\",\"runId\":\"${{ github.run_id }}\",\"tool\":\"github\",\"result\":\"$RESULT\"}"
          fi
